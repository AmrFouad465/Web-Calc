<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculater</title>
    <link rel="stylesheet" href="Css/all.min.css">
    <link rel="stylesheet" href="Css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+NO:wght@100..400&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Css/style.css">
</head>
<body>
     <div class="calc pt-3 pb-3">
        <div class="container">

            <div class="screen">
                <div id="expression"></div>
                <br>
                <br>
                <br>
                <div id="result"></div>
            </div>

            <div class="row">
                <div class="col-lg-3">
                    <button type="button" id="delete" class="btn btn-danger w-75"><i class="fa-solid fa-delete-left"></i></button>
                </div>
                <div class="col-lg-3">
                    <button type="button" id="clear" class="btn btn-warning w-75"><i class="fa-solid fa-c"></i></button>
                </div>
                <div class="col-lg-3">
                    <button type="button" id="percent" class="btn btn-warning w-75">%</button>
                </div>
                <div class="col-lg-3 pb-3">
                    <button type="button" id="divide" class="btn btn-warning w-75"><i class="fa-solid fa-divide"></i></button>
                </div>

                <div class="col-lg-3 position-relative">
                    <button type="button" id="one" class="btn btn-secondary w-75"><i class="fa-solid fa-1"></i></button>
                </div>
                <div class="col-lg-3 position-relative">
                    <button type="button" id="two" class="btn btn-secondary w-75"><i class="fa-solid fa-2"></i></button>
                </div>
                <div class="col-lg-3 position-relative">
                    <button type="button" id="three" class="btn btn-secondary w-75"><i class="fa-solid fa-3"></i></button>
                </div>
                <div class="col-lg-3 pb-3 position-relative">
                    <button type="button" id="multiply" class="btn btn-warning w-75"><i class="fa-solid fa-xmark"></i></button>
                </div>

                <div class="col-lg-3 position-relative">
                    <button type="button" id="four" class="btn btn-secondary w-75"><i class="fa-solid fa-4"></i></button>
                </div>
                <div class="col-lg-3 position-relative">
                    <button type="button" id="five" class="btn btn-secondary w-75"><i class="fa-solid fa-5"></i></button>
                </div>
                <div class="col-lg-3 position-relative">
                    <button type="button" id="six" class="btn btn-secondary w-75"><i class="fa-solid fa-6"></i></button>
                </div>
                <div class="col-lg-3 pb-3 position-relative">
                    <button type="button" id="plus" class="btn btn-warning w-75"><i class="fa-solid fa-plus"></i></button>
                </div>

                <div class="col-lg-3 position-relative">
                    <button type="button" id="seven" class="btn btn-secondary w-75"><i class="fa-solid fa-7"></i></button>
                </div>
                <div class="col-lg-3 position-relative">
                    <button type="button" id="eight" class="btn btn-secondary w-75"><i class="fa-solid fa-8"></i></button>
                </div>
                <div class="col-lg-3 position-relative">
                    <button type="button" id="nine" class="btn btn-secondary w-75"><i class="fa-solid fa-9"></i></button>
                </div>
                <div class="col-lg-3 pb-3 position-relative">
                    <button type="button" id="minus" class="btn btn-warning w-75"><i class="fa-solid fa-minus"></i></button>
                </div>
                
                <div class="col-lg-3 position-relative">
                    <button type="button" id="zero" class="btn btn-secondary w-75"><i class="fa-solid fa-0"></i></button>
                </div>
                <div class="col-lg-3 position-relative">
                    <button type="button" id="dot" class="btn btn-secondary w-75" style="font-weight: bold;">.</button>
                </div>
                <div class="col-lg-6 position-relative">
                    <button type="button" id="eq" class="position-absolute btn btn-success w-75 float-right"><i class="fa-solid fa-equals"></i></button>
                </div>
            </div>

        </div>
     </div>
    <script src="JS/bootstrap.bundle.min.js"></script>
    <script src="JS/all.min.js"></script>
    <script src="JS/main.js"></script>
</body>
</html>
